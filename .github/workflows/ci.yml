name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Swift bridge
        run: |
          cd swift
          swift build -c release
          codesign --force --sign - --entitlements apple-bridge.entitlements .build/release/apple-bridge

      - name: Verify Info.plist is embedded
        run: otool -s __TEXT __info_plist swift/.build/release/apple-bridge > /dev/null

      - name: Swift validation smoke (access-independent)
        run: |
          out=$(swift/.build/release/apple-bridge update-event --id X --span sideways)
          echo "$out"
          echo "$out" | grep -q '"status" : "error"'

      # AppleBridgeCore unit tests (models, validation, recurring slot matching,
      # E2E marker/source guards). EventKit-free, so no calendar access needed.
      # macos-latest provides the Xcode 16+ / Swift 6 toolchain Swift Testing
      # requires (the package manifest stays swift-tools-version: 5.9).
      - name: Swift unit tests
        run: cd swift && swift test

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      # Runs the vitest `unit` project only (schema, arg-builder, bridge
      # contract, MCP integration). The `e2e` project is never selected here,
      # so the E2E suite — the only layer that touches a real calendar — never
      # runs in CI.
      - name: Test
        run: npm test
